    <!-- MAIN CONTENT -->
  <main class="enquiry-content">
    <h1>Consulta & Reserva</h1>
    <form action="/form-handlers/enquiry-handler.php" method="POST">
      <!-- Honeypot field for spam prevention -->
      <input type="text" name="website" style="display:none">

      <div class="form-row"><h2>Ingresa tus datos</h2></div>

      <label for="firstName">Nombre</label>
      <input type="text" id="firstName" name="firstName" placeholder="Nombre" required>

      <label for="lastName">Apellido</label>
      <input type="text" id="lastName" name="lastName" placeholder="Apellido" required>

      <label for="email">Correo Electronico</label>
      <input type="email" id="email" name="email" placeholder="Correo Electronico" required>

      <label for="phone">Telefono</label>
      <input type="tel" id="phone" name="phone" placeholder="Telefono Mobile" required>

      <div class="apart-row"><h2>Eliga una de nuestras 5 opciones</h2></div>
      <select name="apart-no" id="apart-no" aria-label="Select an apartment" required>
        <option value="" disabled selected>Por favor, elige una opcion</option>
        <option value="No.1">NO. 1 - 55-60€</option>
        <option value="No.2">NO. 2 - 120-130€</option>
        <option value="No.3">NO. 3 - 80-90€</option>
        <option value="No.4">NO. 4 - 130-145€</option>
        <option value="No.5">NO. 5 - 75-85€</option>
      </select>

      <div class="form-row"><h2>Cuantos personas?</h2></div>
      <select name="no-of-people" id="no-of-people" required aria-label="Number of guests">
        <option value="" disabled selected>Por favor, elige una opcion</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
      </select>

      <div class="form-row"><h2>Elige tus fechas</h2></div>

      <label for="checkInDate">Check-in</label>
      <input type="date" id="checkInDate" name="checkInDate" required>

      <label for="checkOutDate">Check-out</label>
      <input type="date" id="checkOutDate" name="checkOutDate" required>

      <button type="submit" class="submit-btn">Enviar</button>
    </form>
    <footer>
      <div id="footer-placeholder"></div>
      <div class="clearfloat"></div>
    </footer>
