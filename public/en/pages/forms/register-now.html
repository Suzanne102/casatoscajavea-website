<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register Now - Casa Tosca Jávea</title>

     <!-- 2. SEO -->
    <meta name="description" content="Request a booking at Casa Tosca – a boutique guesthouse in the old town of Jávea with 5 beautiful apartment options." />
    <meta name="keywords" content="javea rental, boutique guesthouse, casa tosca, enquire now, apartment booking javea, old town accommodation" /> 
       <!-- Canonical and hreflang -->
    <link rel="canonical" href="https://www.casatoscajavea.com/en/pages/forms/register-now.html" />
    <link rel="alternate" hreflang="es" href="https://www.casatoscajavea.com/pages/forms/hoja-registro.html" />
    <link rel="alternate" hreflang="en" href="https://www.casatoscajavea.com/en/pages/forms/register-now.html" />
    <link rel="alternate" hreflang="x-default" href="https://www.casatoscajavea.com/en/pages/forms/register-now.html" />
    
     <!-- 8. Styles & external resources -->    
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/form-styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />  
</head>
<body>
    <div id="nav-placeholder"></div>
    <main>
        <div class="form-container">

            <div class="form-row">
            <h2>Establishment Details</h2>
            <p><strong>NIE:</strong> Y5519217J</p>
            <p><strong>Owner:</strong> Peter Zwager</p>
            <p><strong>Property:</strong> Casa Tosca Jávea</p>
            <p><strong>Town:</strong> Xàbia / Jávea</p>
            <p><strong>Province:</strong> Alicante</p>
            </div>

            <form action="/form-handlers/registro-handler.php" method="post" enctype="multipart/form-data">
            <div class="form-row">
                <h2>Identification Document</h2>
                <label for="id-upload">Upload ID (Passport / ID Card):</label>
                <input type="file" id="id-upload" name="id-upload" accept=".jpg,.jpeg,.png,.pdf" required>
            </div>

            <div class="form-row">
                <label for="tipodoc">Document Type</label>
                <select id="tipodoc" name="tipodoc" required>
                <option value="">Select…</option>
                <option value="dni">National ID (DNI)</option>
                <option value="pasaporte">Passport</option>
                <option value="conducir">Driver’s License</option>
                </select>
            </div>

            <div class="form-row">
                <label for="no-id">Document Number</label>
                <input type="text" id="no-id" name="no-id" required>
            </div>

            <div class="form-row">
                <label for="fecha-expedicion">Issue Date</label>
                <input type="date" id="fecha-expedicion" name="fecha-expedicion" required>
            </div>

            <div class="form-row">
                <h2>Guest Information</h2>

                <label for="apellido1">Surname</label>
                <input type="text" id="apellido1" name="apellido1" required>

                <label for="apellido2">Second Surname (optional)</label>
                <input type="text" id="apellido2" name="apellido2">

                <label for="nombre">First Name</label>
                <input type="text" id="nombre" name="nombre" required>

                <label>Sex</label>
                <label><input type="radio" name="sexo" value="M" required> Male</label>
                <label><input type="radio" name="sexo" value="F"> Female</label>

                <label for="fecha-nacimiento">Date of Birth</label>
                <input type="date" id="fecha-nacimiento" name="fecha-nacimiento" required>

                <label for="pais">Country of Nationality</label>
                <input type="text" id="pais" name="pais" required>
            </div>

            <button type="submit" class="submit-btn">Submit</button>

            </form>

        </div>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Load navigation
            fetch('/en/templates/nav.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('nav-placeholder').innerHTML = data;

            // Load nav.js AFTER nav.html is in DOM
            const script = document.createElement('script');
              script.src = "/js/nav.js";
              script.onload = () => {
                initNav(); // now nav.js exists, and nav.html exists
              };
            document.body.appendChild(script);
            });

        });
    </script>
</body>
</html>
