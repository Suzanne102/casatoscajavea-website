<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Register Now - Casa Tosca Jávea</title>

        <!-- 2. SEO -->
        <meta name="description" content="Request a booking at Casa Tosca – a boutique guesthouse in the old town of Jávea with 5 beautiful apartment options." />
        <meta name="keywords" content="javea rental, boutique guesthouse, casa tosca, enquire now, apartment booking javea, old town accommodation" /> 
        <!-- Canonical and hreflang -->
        <link rel="canonical" href="https://www.casatoscajavea.com/en/pages/forms/registration.html" />
        <link rel="alternate" hreflang="es" href="https://www.casatoscajavea.com/pages/forms/registro.html" />
        <link rel="alternate" hreflang="en" href="https://www.casatoscajavea.com/en/pages/forms/registration.html" />
        <link rel="alternate" hreflang="x-default" href="https://www.casatoscajavea.com/en/pages/forms/registration.html" />
        
        <!-- 8. Styles & external resources -->    
        <link rel="stylesheet" href="/css/styles.css" />
        <link rel="stylesheet" href="/css/form-styles.css" />
        <script src="/js/nav.js" defer></script>
        <script src="/js/loadPartials.js" defer></script>
            
        <!-- FontAwesome Styles -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />  
    </head>
    <body>
        <div id="nav-placeholder"></div>
        <main>
            <div class="form-container">

                <div class="form-row">
                <h2>Establishment Details</h2>
                <p><strong>NIE:</strong> Y5519217J</p>
                <p><strong>Owner:</strong> Peter Zwager</p>
                <p><strong>Property:</strong> Casa Tosca Jávea</p>
                <p><strong>Town:</strong> Xàbia / Jávea</p>
                <p><strong>Province:</strong> Alicante</p>
                </div>

                <form action="/form-handlers/registro-handler.php" method="post" enctype="multipart/form-data" class="guest-form">
    
                    <input type="hidden" name="lang" value="en">
                    <input type="text" name="website" style="display:none">

                    <!-- Identification -->
                    <section class="form-section">
                        <h2>Identification Document</h2>

                        <div class="form-field">
                            <label for="id-upload">Upload ID (Passport / ID Card)</label>
                            <input type="file" id="id-upload" name="id-upload" accept=".jpg,.jpeg,.png,.pdf" required>
                        </div>

                        <div class="form-field">
                            <label for="tipodoc">Document Type</label>
                            <select id="tipodoc" name="tipodoc" required>
                                <option value="">Select…</option>
                                <option value="dni">National ID (DNI)</option>
                                <option value="pasaporte">Passport</option>
                                <option value="conducir">Driver’s License</option>
                            </select>
                        </div>

                        <div class="form-field">
                            <label for="no-id">Document Number</label>
                            <input type="text" id="no-id" name="no-id" required>
                        </div>

                        <div class="form-field">
                            <label for="fecha-expedicion">Issue Date</label>
                            <input type="date" id="fecha-expedicion" name="fecha-expedicion" required>
                        </div>
                    </section>

                    <!-- Guest Info -->
                    <section class="form-section">
                        <h2>Guest Information</h2>

                        <div class="form-field">
                            <label for="nombre">Full Name</label>
                            <input type="text" id="nombre" name="nombre" required>
                        </div>

                        <div class="form-field">
                            <span class="field-label">Sex</span>
                            <div class="radio-group">
                                <label><input type="radio" name="sexo" value="M" required> Male</label>
                                <label><input type="radio" name="sexo" value="F"> Female</label>
                            </div>
                        </div>

                        <div class="form-field">
                            <label for="fecha-nacimiento">Date of Birth</label>
                            <input type="date" id="fecha-nacimiento" name="fecha-nacimiento" required>
                        </div>

                        <div class="form-field">
                            <label for="pais">Country of Nationality</label>
                            <input type="text" id="pais" name="pais" required>
                        </div>

                        <div class="form-field">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email">
                        </div>

                        <div class="form-field">
                            <label for="telefono">Phone</label>
                            <input type="tel" id="telefono" name="telefono">
                        </div>

                        <div class="form-field">
                            <label for="fecha-llegada">Arrival Date</label>
                            <input type="date" id="fecha-llegada" name="fecha-llegada">
                        </div>
                    </section>

                    <button type="submit" class="submit-btn">Submit Registration</button>

                </form>

            </div>
        </main>
    </body>
</html>
