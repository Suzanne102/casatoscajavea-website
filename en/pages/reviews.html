    <script>
      document.addEventListener('DOMContentLoaded', function () {

        // Load navigation
        fetch('/en/templates/nav.html')
          .then(response => response.text())
          .then(data => {
            document.getElementById('nav-placeholder').innerHTML = data;

            // Load nav.js AFTER nav.html is in DOM
            const script = document.createElement('script');
            script.src = "/js/nav.js";
            script.onload = () => {
              initNav(); // now nav.js exists, and nav.html exists
            };
            document.body.appendChild(script);
          });

        // Load footer
        fetch('/en/templates/footer.html')
          .then(response => response.text())
          .then(data => {
            document.getElementById('footer-placeholder').innerHTML = data;
          });

        // Load apartment navbar ONLY if placeholder exists
        const aptPlaceholder = document.getElementById('apt-nav-placeholder');
        if (aptPlaceholder) {
          fetch('/en/templates/apt-nav.html')
            .then(response => response.text())
            .then(data => {
              aptPlaceholder.innerHTML = data;
            });
        }

      });
    </script>
